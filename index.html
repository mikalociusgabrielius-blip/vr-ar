<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>VR Cardboard Test - Hand Tracking</title>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<style>
body { margin:0; overflow:hidden; background:black; }

video {
  position:absolute;
  top:0;
  left:0;
  width:100vw;
  height:100vh;
  object-fit:cover;
}

canvas {
  position:absolute;
  top:0;
  left:0;
  width:100vw;
  height:100vh;
}
</style>
</head>

<body>
<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

// Naudojame priekinę kamerą testui
navigator.mediaDevices.getUserMedia({
  video: { facingMode: "user" }
})
.then(stream => {
  video.srcObject = stream;
})
.catch(err => {
  alert("Kamera neveikia: " + err.message);
});

// MediaPipe setup
const hands = new Hands({
  locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
});

hands.setOptions({
  maxNumHands: 1,
  modelComplexity: 0,
  minDetectionConfidence: 0.6,
  minTrackingConfidence: 0.6
});

// Piešimas ant canvas su split screen
hands.onResults(results => {
  if (!video.videoWidth) return;

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.clearRect(0,0,canvas.width,canvas.height);

  // Nupiešiam rankos landmarkus
  if (results.multiHandLandmarks.length > 0) {
    const hand = results.multiHandLandmarks[0];
    for (let i = 0; i < hand.length; i++) {
      const x = hand[i].x * (canvas.width / 2); // split screen per pusę
      const y = hand[i].y * canvas.height;

      ctx.beginPath();
      ctx.arc(x, y, 8, 0, Math.PI*2);
      ctx.fillStyle = "lime";
      ctx.fill();
    }
  }

  // Split screen: nupiešiame video kairėje ir dešinėje
  ctx.drawImage(video, 0, 0, canvas.width/2, canvas.height); // kairė akis
  ctx.drawImage(video, canvas.width/2, 0, canvas.width/2, canvas.height); // dešinė akis
});

// Paleidžiame MediaPipe kai video ready
video.addEventListener("loadeddata", () => {
  const cameraMP = new Camera(video, {
    onFrame: async () => {
      await hands.send({ image: video });
    },
    width: 640,
    height: 480
  });
  cameraMP.start();
});
</script>

</body>
</html>
