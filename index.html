<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Hand Tracking Fallback</title>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<style>
body { margin:0; overflow:hidden; background:black; }
video {
  position:absolute;
  top:0;
  left:0;
  width:100vw;
  height:100vh;
  object-fit:cover;
}
canvas {
  position:absolute;
  top:0;
  left:0;
  width:100vw;
  height:100vh;
}
</style>
</head>

<body>
<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

// Funkcija gauti kamerą su fallback
async function initCamera() {
  try {
    // Pirmas bandymas: galinė kamera
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: "environment" } }
    });
    video.srcObject = stream;
  } catch(err) {
    console.warn("Pirmas bandymas nepavyko, fallback:", err.message);
    try {
      // Fallback: bet kuri kamera
      const stream = await navigator.mediaDevices.getUserMedia({ video: true });
      video.srcObject = stream;
    } catch(err2) {
      alert("Kamera vis tiek neveikia: " + err2.message);
      return;
    }
  }
}

// MediaPipe setup
const hands = new Hands({
  locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
});

hands.setOptions({
  maxNumHands: 1,
  modelComplexity: 0,
  minDetectionConfidence: 0.6,
  minTrackingConfidence: 0.6
});

// Piešimas ant canvas
hands.onResults(results => {
  if (!video.videoWidth) return;

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.clearRect(0,0,canvas.width,canvas.height);

  if (results.multiHandLandmarks.length > 0) {
    const hand = results.multiHandLandmarks[0];

    for (let i = 0; i < hand.length; i++) {
      const x = hand[i].x * canvas.width;
      const y = hand[i].y * canvas.height;

      ctx.beginPath();
      ctx.arc(x, y, 10, 0, Math.PI*2);
      ctx.fillStyle = "lime";
      ctx.fill();
    }
  }
});

// Paleidžiame MediaPipe kai video ready
video.addEventListener("loadeddata", () => {
  const cameraMP = new Camera(video, {
    onFrame: async () => {
      await hands.send({ image: video });
    },
    width: 640,
    height: 480
  });
  cameraMP.start();
});

// Start kamerą
initCamera();
</script>
</body>
</html>
