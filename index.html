<!DOCTYPE html>

<html>
<head>
<meta charset="utf-8">
<title>Hand Tracking FIX</title>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<style>
body { margin:0; overflow:hidden; background:black; }

video {
  position:absolute;
  top:0;
  left:0;
  width:100vw;
  height:100vh;
  object-fit:cover;
}

canvas {
  position:absolute;
  top:0;
  left:0;
  width:100vw;
  height:100vh;
}
</style>

</head>

<body>

<video id="video" autoplay playsinline></video> <canvas id="canvas"></canvas>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

// 👉 Redmi FIX (be exact!)
navigator.mediaDevices.getUserMedia({
  video: { facingMode: "environment" }
})
.then(stream => {
  video.srcObject = stream;
})
.catch(err => {
  alert("Klaida su kamera: " + err.message);
});

// MediaPipe
const hands = new Hands({
  locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
});

hands.setOptions({
  maxNumHands: 1,
  modelComplexity: 0,
  minDetectionConfidence: 0.6,
  minTrackingConfidence: 0.6
});

hands.onResults(results => {
  if (!video.videoWidth) return;

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.clearRect(0,0,canvas.width,canvas.height);

  if (results.multiHandLandmarks.length > 0) {
    const hand = results.multiHandLandmarks[0];

    for (let i = 0; i < hand.length; i++) {
      const x = hand[i].x * canvas.width;
      const y = hand[i].y * canvas.height;

      ctx.beginPath();
      ctx.arc(x, y, 10, 0, Math.PI*2);
      ctx.fillStyle = "lime";
      ctx.fill();
    }
  }
});

// 👉 Paleisti tik kai video tikrai veikia
video.addEventListener("loadeddata", () => {
  const camera = new Camera(video, {
    onFrame: async () => {
      await hands.send({ image: video });
    },
    width: 640,
    height: 480
  });
  camera.start();
});
</script>

</body>
</html>
